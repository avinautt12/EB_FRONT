<app-top-bar></app-top-bar>

<div class="auth auth--liquid liquid-bg">
  <div class="auth__bg"></div>

  <div class="auth__card">
    <div class="auth__shine"></div>

    <header class="auth__header">
      <h1>Iniciar sesión</h1>
      <p>Accede a tu cuenta</p>
    </header>

    <form class="auth__form" (ngSubmit)="iniciarSesion()" #loginForm="ngForm">
      <div class="field">
        <label for="email">Usuario</label>
        <input type="email" id="email" name="email" placeholder="Usuario" required [(ngModel)]="email" class="input-base">
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <input [type]="verPassword ? 'text' : 'password'" id="password" name="password" placeholder="Contraseña" required
            [(ngModel)]="password" class="password-input input-base">
          <button type="button" class="icon-btn" (click)="verPassword = !verPassword" [attr.aria-label]="verPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'">
            <i class="fas" [ngClass]="verPassword ? 'fa-eye' : 'fa-eye-slash'"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="primary-btn" [disabled]="loading">
        <span *ngIf="loading" class="spinner"></span>
        {{ loading ? 'Ingresando...' : 'Iniciar sesión' }}
      </button>
    </form>

    <div *ngIf="error" class="error-pill">
      {{ error }}
    </div>
  </div>
</div>
